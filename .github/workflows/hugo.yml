name: Build & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build the site
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      TZ: "Europe/Ljubljana"

    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config core.quotepath false

      - name: Install Hugo
        env:
          HUGO_VERSION: "0.161.1"
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Install Dart Sass
        env:
          DART_SASS_VERSION: "1.99.0"
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          mkdir -p "${HOME}/.local/dart-sass"
          tar -C "${HOME}/.local/dart-sass" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" --strip-components=1
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Verify installations
        run: |
          echo "Hugo: $(hugo version)"
          echo "Dart Sass: $(sass --version)"

      - name: Restore the Hugo cache
        id: cache-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/hugo-cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: Build the site
        working-directory: hugo
        run: |
          hugo build --gc --minify --cacheDir "${{ runner.temp }}/hugo-cache"

      - name: Save the Hugo cache
        id: cache-save
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/hugo-cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload the artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: github-pages
          path: hugo/public

  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  deploy-progklub-server:
    name: Deploy to ProgKlub Server
    runs-on: ubuntu-latest

    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

    environment:
      name: progklub-server
      url: "https://progklub.si/"

    permissions:
      contents: read

    needs: build

    steps:
      - name: Install rclone
        env:
          RCLONE_VERSION: "1.74.0"
        run: |
          curl -fLO "https://downloads.rclone.org/v${RCLONE_VERSION}/rclone-v${RCLONE_VERSION}-linux-amd64.deb"
          sudo apt-get install -y "./rclone-v${RCLONE_VERSION}-linux-amd64.deb"
          rm "rclone-v${RCLONE_VERSION}-linux-amd64.deb"

      - name: Verify installations
        run: |
          echo "rclone: $(rclone version)"

      - name: Download the artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages
          path: website

      - name: Prepare SSH configuration
        run: |
          install -d -m 700 ~/.ssh
          echo "${{ secrets.PROGKLUB_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Prepare SSH key for SFTP server
        run: |
          echo "${{ secrets.PROGKLUB_SFTP_PRIVATE_KEY }}" > ~/.ssh/sftp_private_key
          chmod 600 ~/.ssh/sftp_private_key

      - name: Prepare SSH key for proxy server
        if: ${{ secrets.PROGKLUB_PROXY_PRIVATE_KEY != '' }}
        run: |
          echo "${{ secrets.PROGKLUB_PROXY_PRIVATE_KEY }}" > ~/.ssh/proxy_private_key
          chmod 600 ~/.ssh/proxy_private_key

      - name: Start SOCKS proxy via SSH
        if: ${{ secrets.PROGKLUB_PROXY_PRIVATE_KEY != '' }}
        env:
          PROXY_HOST: ${{ vars.PROGKLUB_PROXY_HOST }}
          PROXY_USER: ${{ vars.PROGKLUB_PROXY_USER }}
          PROXY_SOCKS_PORT: "1921"
        run: |
          echo "Starting SSH SOCKS proxy to ${PROXY_USER}@${PROXY_HOST} on port ${PROXY_SOCKS_PORT}..."
          ssh -N -D "${PROXY_SOCKS_PORT}" -i ~/.ssh/proxy_private_key "${PROXY_USER}@${PROXY_HOST}" &
          echo "Started SSH SOCKS proxy with PID $!"
          sleep 5

      - name: Deploy to ProgKlub Server
        env:
          RCLONE_VERBOSE: 2
          RCLONE_CONFIG_PROGKLUB_TYPE: sftp
          RCLONE_CONFIG_PROGKLUB_HOST: ${{ vars.PROGKLUB_SFTP_HOST }}
          RCLONE_CONFIG_PROGKLUB_USER: ${{ vars.PROGKLUB_SFTP_USER }}
          RCLONE_CONFIG_PROGKLUB_KEY_FILE: ~/.ssh/private_key
          RCLONE_CONFIG_PROGKLUB_KNOWN_HOSTS_FILE: ~/.ssh/known_hosts
          RCLONE_CONFIG_SFTP_SOCKS_PROXY: ${{ secrets.PROGKLUB_PROXY_PRIVATE_KEY != '' && 'localhost:1921' || '' }}
          PROGKLUB_REMOTE_DIR: ${{ vars.PROGKLUB_SFTP_DESTINATION }}
        run: |
          rclone sync website "progklub:${PROGKLUB_REMOTE_DIR}" --progress
