{{ define "main" }}
  <section class="section">
    <h1 class="title is-2 has-text-centered">{{ .Title }}</h1>
    {{ with .Content }}<div class="content">{{ . }}</div>{{ end }}
  </section>

  <section class="section">
    {{ range .RegularPages.ByWeight }}
      <article>
        <h2 class="title is-3 has-text-centered">{{ .Title }}</h2>
        <div class="content">{{ .Content }}</div>
      </article>
    {{ end }}
  </section>
{{ end }}
