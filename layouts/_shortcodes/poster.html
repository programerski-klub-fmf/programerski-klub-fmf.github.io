{{- $alt := .Get "alt" -}}
{{- $src := .Get "src" -}}

{{- with .Page.Resources.Get $src -}}
  <figure class="image max-width-500">
    <img src="{{ .RelPermalink }}"
         alt="{{ $alt }}"
         width="{{ .Width }}"
         height="{{ .Height }}"
         loading="lazy"
    />
  </figure>
{{- end -}}
