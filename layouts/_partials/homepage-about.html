<article class="card">
  <header class="card-header">
    <h3 class="card-header-title icon-text">
      <span>
        <span class="icon"><i class="fas fa-circle-info"></i></span>
        <span>{{ .Title }}</span>
      </span>

    </h3>
  </header>
  <div class="card-content">
    <div class="content">{{ .Content }}</div>
  </div>
</article>
